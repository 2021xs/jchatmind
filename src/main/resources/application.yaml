spring:
  application:
    name: jchatmind
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/jchatmind}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  mail:
    host: smtp.qq.com
    port: 587
    username: your-email
    password: your-password # 邮箱授权码
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_BASE_URL:https://rapi.asia/v1}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-v4-pro}
    zhipuai:
      api-key: your-api-key
      base-url: https://open.bigmodel.cn/api/paas
      chat:
        options:
          model: glm-4.6
mybatis:
  type-aliases-package: com.kama.jchatmind.model.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.kama.jchatmind.typehandler

document:
  storage:
    base-path: ./data/documents

jchatmind:
  code-rag:
    allowed-roots:
      - D:/Project
      - D:/workspace
    max-file-size-bytes: 1048576
    max-files-per-import: 2000
  tool-gateway:
    default-timeout-ms: 10000
    default-max-result-length: 4000
    max-code-search-top-k: 10
    database-query-timeout-seconds: 5
    database-max-rows: 50
