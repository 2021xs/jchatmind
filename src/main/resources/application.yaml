spring:
  application:
    name: jchatmind
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/jchatmind}
    username: ${POSTGRES_USER:your-db-user}
    password: ${POSTGRES_PASSWORD:your-db-password}
    driver-class-name: org.postgresql.Driver
  ai:
    deepseek:
      api-key: ${DEEPSEEK_RELAY_API_KEY:your-api-key}
      base-url: ${DEEPSEEK_RELAY_BASE_URL:https://rapi.asia/v1}
      chat:
        options:
          model: ${DEEPSEEK_RELAY_MODEL:deepseek-v4-pro}
    zhipuai:
      api-key: your-api-key
      base-url: https://open.bigmodel.cn/api/paas
      chat:
        options:
          model: glm-4.6
mybatis:
  type-aliases-package: com.kama.jchatmind.model.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.kama.jchatmind.typehandler

document:
  storage:
    base-path: ./data/documents

jchatmind:
  database-tool:
    datasource:
      url: ${JCHATMIND_DB_READONLY_URL:jdbc:postgresql://localhost:5432/jchatmind}
      username: ${JCHATMIND_DB_READONLY_USERNAME:jchatmind_readonly}
      password: ${JCHATMIND_DB_READONLY_PASSWORD:}
      driver-class-name: org.postgresql.Driver
  ai:
    deepseek:
      official:
        api-key: ${DEEPSEEK_OFFICIAL_API_KEY:your-api-key}
        base-url: ${DEEPSEEK_OFFICIAL_BASE_URL:https://api.deepseek.com}
        model: ${DEEPSEEK_OFFICIAL_MODEL:deepseek-chat}
  code-rag:
    # Final answer-time Code RAG path:
    # RAW_VECTOR candidates + LLM evidence selector.
    allowed-roots:
      - D:/Project
      - D:/workspace
    max-file-size-bytes: 1048576
    max-files-per-import: 2000
    embedding-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    embedding-model: ${OLLAMA_EMBEDDING_MODEL:bge-m3}
    embedding-warmup:
      enabled: true
      prompt: warmup code rag embedding
    embedding-cache:
      enabled: true
      max-size: 512
      ttl-minutes: 30
    embedding-metadata:
      enabled: true
    contextual-prefix:
      # Embedding-time structured context prefix. Requires repository re-import to affect vectors.
      enabled: true
    llm-selector:
      # Tests may disable this to verify fallback; normal Agent flow keeps selector on.
      enabled: true
      model: deepseek-official-chat
      max-candidate-chars: 600
      max-selected: 5
      timeout-ms: 30000
    answer-evidence:
      # Agent tool answer-time evidence path. REST /search keeps the raw candidate endpoint.
      raw-top-k: 20
      final-top-k: 5
      include-selector-debug: true
  agent:
    database-tool:
      max-rows: ${AGENT_DB_TOOL_MAX_ROWS:50}
      query-timeout-seconds: ${AGENT_DB_TOOL_QUERY_TIMEOUT_SECONDS:5}
      fetch-size: ${AGENT_DB_TOOL_FETCH_SIZE:50}
      max-cell-chars: ${AGENT_DB_TOOL_MAX_CELL_CHARS:500}
      max-result-length: ${AGENT_DB_TOOL_MAX_RESULT_LENGTH:4000}
    observability:
      stale-running-threshold-minutes: 10
      recovery-enabled: true
    tool-correction:
      enabled: true
      max-attempts: 3
  context-compression:
    enabled: true
    keep-recent-rounds: 8
    max-history-messages: 20
    max-summary-chars: 1200
    trigger-message-count: 21
    max-context-tokens: 5000
    max-single-tool-result-tokens: 1200
    chars-per-token: 3
